<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chessy — Threat Heatmap Chess</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <h1>Chessy</h1>
    <div id="status">White to move</div>
    <div id="controls">
      <button id="heatmap-toggle">Threat Heatmap</button>
      <button id="counts-toggle">Show Counts</button>
      <button id="reset-btn">New Game</button>
    </div>
    <div id="legend" class="hidden">
      <span class="legend-label white-label">White controls</span>
      <div class="legend-bar"></div>
      <span class="legend-label black-label">Black controls</span>
    </div>
    <div id="board-container">
      <div id="board"></div>
    </div>
    <div id="captured">
      <div id="captured-white" class="captured-row"></div>
      <div id="captured-black" class="captured-row"></div>
    </div>
  </div>
  <script src="chess.js"></script>
  <script src="ui.js"></script>
</body>
</html>
